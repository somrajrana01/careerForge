services:
  postgres:
    image: postgres:16
    container_name: talentforge-postgres
    environment:
      POSTGRES_DB: talentforge
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - talentforge-postgres-data:/var/lib/postgresql/data

volumes:
  talentforge-postgres-data:
